aid: thirdweb
url: https://raw.githubusercontent.com/api-evangelist/thirdweb/refs/heads/main/apis.yml
name: thirdweb
kind: company
description: thirdweb is a full-stack web3 development platform. Its HTTP APIs unify
  wallet management, transaction execution, smart contract read/write, token and NFT
  operations, fiat-to-crypto payments and bridging, indexed on-chain data, and an
  AI blockchain interface across thousands of EVM chains and Solana, authenticated
  with a client ID or secret key.
